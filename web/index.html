<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bang Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <header id="lobbyPanel" class="lobby-screen">
    <div class="lobby-card">
      <h1 class="bang-logo">BANG!</h1>

      <input id="nick" class="lobby-input" placeholder="닉네임을 입력하세요" />

      <div class="lobby-row">
        <button id="btnCreate" class="primary">방 만들기</button>
      </div>

      <div class="lobby-row">
        <input id="roomCode" class="lobby-input" placeholder="방 코드" />
        <button id="btnJoin">참가</button>
      </div>

      <button id="btnStart">게임 시작</button>

      <div class="lobby-sub-info">
        현재 방: <b id="currentRoom">-</b>
        <button id="btnCopy">복사</button>
        <br />
        상태: <b id="status">-</b>
        현재 턴 좌석: <b id="turnSeat">-</b>
        내 좌석: <b id="mySeat" class="muted">-</b>
      </div>

      <div class="lobby-options">
        <span class="pill">알림음 <input type="checkbox" id="soundToggle"></span>
        <button id="btnSaveLog">로그 저장</button>
        <button id="btnLeave" class="danger">나가기</button>
        <button id="btnEndTurn">턴 종료</button>
      </div>
    </div>
  </header>

  <main id="gameScreen" class="game-screen" style="display:none;">

    <section class="table-area">
      <div class="table-status">
        <span>플레이어 <b id="playerCount"></b></span>
        <span>현재 턴: <b id="turnSeatView">-</b></span>
      </div>

      <div class="table-wrapper">

        <div id="players" class="players"></div>

        <div id="pileArea" class="center-pile"></div>

      </div>
    </section>

    <section class="message-area">
      <div class="message-header">
        <b>게임 로그 / 채팅</b>
      </div>

      <div id="log"></div>

      <div class="chat-input-row">
        <input id="chatInput" placeholder="메시지 입력" />
        <button id="btnSend" class="primary">보내기</button>
      </div>
    </section>

    <section class="hand-section">
      <div class="hand-title">
        <b>내 손패</b>
        <div id="roleBadge" class="pill" style="display:none;">
          <span>내 역할: <b id="myRole"></b></span>
        </div>
      </div>

      <div id="handArea" class="hand-area"></div>
    </section>

  </main>

  <!-- Simple Modal -->
  <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; z-index:9998;">
    <div style="background:#fff; border-radius:12px; padding:16px; min-width:280px; max-width:90%; box-shadow:0 10px 30px rgba(0,0,0,.2)">
      <div id="modalTitle" style="font-weight:700; margin-bottom:8px">선택</div>
      <div id="modalBody"></div>
      <div style="margin-top:12px; text-align:right">
        <button id="modalCancel">닫기</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
