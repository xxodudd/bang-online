<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bang Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <h1>Bang Online</h1>

  <div class="row toolbar">
    <input id="nick" placeholder="닉네임" />
    <button id="btnCreate" class="primary">방 만들기</button>
    <input id="roomCode" placeholder="방 코드 (예: ABCDE)" />
    <button id="btnJoin">참가</button>
    <button id="btnStart">게임 시작(호스트)</button>
    <button id="btnEndTurn">턴 종료</button>
    <div class="spacer"></div>
    <span class="pill">알림음 <input type="checkbox" id="soundToggle"></span>
    <button id="btnSaveLog" title="로그 저장">로그 저장</button>
    <button id="btnLeave" class="danger" title="소켓 연결 종료">나가기</button>
  </div>

  <div class="row" style="align-items:center">
    <div>현재 방: <b id="currentRoom">-</b> <button id="btnCopy" title="방 코드 복사">복사</button></div>
    <div style="margin-left:12px">상태: <b id="status">-</b></div>
    <div style="margin-left:12px">현재 턴 좌석: <b id="turnSeat">-</b></div>
    <div style="margin-left:12px">내 좌석(추정): <b id="mySeat" class="muted">-</b></div>
    <div class="spacer"></div>
    <div class="muted">단축키: 채팅 전송 <span class="kbd">Enter</span></div>
  </div>

  <h3>플레이어 <span class="muted" id="playerCount"></span></h3>
  <h3>카드 더미</h3>
  <div id="pileArea" class="row"></div>
  <div id="players" class="players"></div>
  <h3>내 손패</h3>
  <div id="handArea" class="row" style="flex-wrap:wrap; gap:8px"></div>

  <div id="roleBadge" class="pill" style="display:none; margin:8px 0;">
    <span>내 역할: <b id="myRole"></b></span>
  </div>

  <!-- Simple Modal -->
  <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; z-index:9998;">
    <div style="background:#fff; border-radius:12px; padding:16px; min-width:280px; max-width:90%; box-shadow:0 10px 30px rgba(0,0,0,.2)">
      <div id="modalTitle" style="font-weight:700; margin-bottom:8px">선택</div>
      <div id="modalBody"></div>
      <div style="margin-top:12px; text-align:right">
        <button id="modalCancel">닫기</button>
      </div>
    </div>
  </div>


  <h3>로그</h3>
  <div id="log"></div>

  <h3>채팅</h3>
  <div class="row">
    <input id="chatInput" style="flex:1" placeholder="메시지 입력" />
    <button id="btnSend" class="primary">보내기</button>
  </div>
  <div id="chat"></div>
  <div style="position:fixed; right:12px; bottom:12px; display:flex; gap:8px; z-index:9999;">
    <button onclick="playBeer()">맥주</button>
    <button onclick="(function(){const s = prompt('대상 seat 입력(인접만):'); if(s!==null) playBangAt(parseInt(s,10));})()">뱅!</button>
  </div>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
